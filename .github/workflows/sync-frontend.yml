name: Sync Frontend from NewAPI Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git || git remote set-url upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream main

      - name: Sync web directory from upstream
        run: |
          git checkout upstream/main -- web/
          if [ -z "$(git status --porcelain -- web/)" ]; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Setup Bun
        if: env.NO_CHANGES == 'false'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Find and build frontend
        if: env.NO_CHANGES == 'false'
        run: |
          PKG_DIR=$(find web -type f -name package.json -printf '%h\n' | head -n 1)
          if [ -z "$PKG_DIR" ]; then
            echo "No package.json found under web/, aborting build."
            exit 1
          fi
          echo "Found package.json in: $PKG_DIR"
          cd "$PKG_DIR"
          bun install
          bun run build

      - name: Commit and push
        if: env.NO_CHANGES == 'false'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git commit -m "chore: sync web/ from upstream and build [skip ci]" || echo "No changes to commit"
          git push
