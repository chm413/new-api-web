# .github/workflows/sync-frontend.yml
name: Sync and Build Frontend

# 触发条件:
on:
  # (关键) 避免循环触发: 提交到 main 分支时触发，但跳过由本 Action 自身产生的提交。
  push:
    branches:
      - main
  # (推荐) 定时触发: 例如每6小时检查一次上游更新，作为保障。
  schedule:
    - cron: '0 */6 * * *'
  # 支持手动运行
  workflow_dispatch:

# 需要读写仓库内容的权限
permissions:
  contents: write
  pull-requests: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. 从上游同步指定目录
      - name: Sync files from upstream
        # ❗ 使用同步专用 Action
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          # (必须) 使用 GitHub 自动生成的 GITHUB_TOKEN 即可
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
          # (可选) 配合定时任务，强制覆盖本地更改
          OVERWRITE: "true"
          # (重要) 同步完成后，创建一个新 Commit 并推送
          COMMIT_EACH: "true"
        # (重要) 同步步骤完成后生成 Commit，用于后续检测

      # 3. 检查 'web' 目录是否真的有变化
      - name: Check for changes in web directory
        id: check_changes
        run: |
          # 获取当前 HEAD 和上一次 Commit 之间的差异，并检查 'web' 目录
          if git diff --quiet HEAD^1 HEAD -- web/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      # 4. (条件执行) 如果有前端变化，则进行构建
      - name: Setup Bun
        if: steps.check_changes.outputs.changed == 'true'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        if: steps.check_changes.outputs.changed == 'true'
        working-directory: ./web
        run: bun install

      - name: Build frontend
        if: steps.check_changes.outputs.changed == 'true'
        working-directory: ./web
        run: bun run build

      # 5. 提交编译后的产物
      - name: Commit built files
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add web/dist
          git commit -m "chore: build frontend assets [skip ci]" || echo "No changes to commit"
          git push
