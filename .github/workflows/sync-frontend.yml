# .github/workflows/sync-frontend.yml
name: Sync and Build Frontend

on:
  # 定时触发：每6小时检查一次上游更新（可选）
  schedule:
    - cron: '0 */6 * * *'
  # 手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          # 必须使用个人访问令牌（PAT）才能触发后续 push 事件，避免循环
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream repository
        run: |
          git remote add upstream https://github.com/QuantumNous/new-api.git
          git fetch upstream main

      - name: Sync web directory from upstream
        run: |
          # 使用 sparse checkout 方式仅拉取 web 目录（保留历史）
          git checkout upstream/main -- web/
          # 检查是否有变更
          if git diff --quiet -- web/; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Setup Bun (only if changes)
        if: env.NO_CHANGES == 'false'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        if: env.NO_CHANGES == 'false'
        working-directory: ./web
        run: bun install

      - name: Build frontend
        if: env.NO_CHANGES == 'false'
        working-directory: ./web
        run: bun run build

      - name: Commit and push changes
        if: env.NO_CHANGES == 'false'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add web/
          git commit -m "chore: sync upstream web changes and build frontend [skip ci]" || echo "No changes to commit"
          git push
