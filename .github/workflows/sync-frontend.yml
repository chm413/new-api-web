name: Sync Frontend from NewAPI Upstream

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          if git remote | grep -q upstream; then
            git remote set-url upstream https://github.com/QuantumNous/new-api.git
          else
            git remote add upstream https://github.com/QuantumNous/new-api.git
          fi
          git fetch upstream main

      - name: Sync web directory (force overwrite)
        run: |
          git checkout upstream/main -- web/
          if git diff --quiet HEAD -- web/; then
            echo "NO_CHANGES=true" >> $GITHUB_ENV
          else
            echo "NO_CHANGES=false" >> $GITHUB_ENV
          fi

      - name: Setup Bun (if changes)
        if: env.NO_CHANGES == 'false'
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies (if changes)
        if: env.NO_CHANGES == 'false'
        working-directory: ./web
        run: bun install

      - name: Build frontend (if changes)
        if: env.NO_CHANGES == 'false'
        working-directory: ./web
        run: bun run build

      - name: Commit and push changes (if any)
        if: env.NO_CHANGES == 'false'
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add web/
          git commit -m "chore: sync web/ from upstream NewAPI and build [skip ci]"
          git push
